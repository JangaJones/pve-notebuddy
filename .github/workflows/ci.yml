name: CI

on:
  # Run on direct commits to main development branches.
  push:
    branches: [main, dev]
  # Also run for PR validation before merge.
  pull_request:
    branches: [main, dev]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  # Least-privilege: CI only needs repository read access.
  contents: read

env:
  # Opt actions runtime into Node 24 ahead of platform default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate project quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          # Keep runtime pinned for reproducible installs/checks.
          node-version: 22
          # Cache npm modules to speed up repeated runs.
          cache: npm

      - name: Install dependencies (lockfile-aware)
        run: |
          # Use deterministic install when lockfile exists.
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            # Fallback for repos that intentionally do not commit a lockfile.
            npm install --no-audit --no-fund
          fi

      - name: Ensure vendored DOMPurify is in sync
        run: |
          # Regenerate vendored file and fail if committed copy is outdated.
          npm run vendor:dompurify
          git diff --exit-code -- resources/js/vendor/purify.es.mjs

      - name: Syntax-check JavaScript modules
        run: |
          # Parse-check all JS modules without executing project code.
          set -euo pipefail
          while IFS= read -r file; do
            node --check "$file"
          done < <(find resources/js -type f \( -name '*.js' -o -name '*.mjs' \) | sort)

      - name: Validate JSON fixtures and templates
        run: |
          # Verify all JSON fixtures/templates are valid JSON documents.
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const roots = ['templates', 'testing'];
          const jsonFiles = [];

          function walk(dir) {
            if (!fs.existsSync(dir)) return;
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(p);
              else if (entry.isFile() && p.endsWith('.json')) jsonFiles.push(p);
            }
          }

          roots.forEach(walk);
          let failures = 0;
          for (const file of jsonFiles.sort()) {
            try {
              JSON.parse(fs.readFileSync(file, 'utf8'));
            } catch (err) {
              failures += 1;
              console.error(`Invalid JSON: ${file}`);
              console.error(err.message);
            }
          }

          if (failures > 0) process.exit(1);
          console.log(`Validated ${jsonFiles.length} JSON files.`);
          NODE
